<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:transparent;height:100vh;display:flex;flex-direction:column}
#box{max-width:420px;width:100%;margin:0 auto;background:#151a28;border:1px solid rgba(212,175,55,0.2);border-radius:12px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{text-align:center;padding:0.8rem 0.6rem;border-bottom:1px solid rgba(212,175,55,0.2);background:linear-gradient(135deg,#0a0e1a,#151a28)}
header .avatar{width:48px;height:48px;border-radius:50%;border:2px solid #d4af37;margin-bottom:0.3rem}
header h3{margin:0;font-size:0.95rem;font-weight:600;color:#d4af37}
header p{color:#8b9dc3;font-size:0.75rem;margin-top:0.1rem}
#msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.m{padding:8px 12px;border-radius:10px;font-size:.85rem;line-height:1.5;max-width:90%;white-space:pre-wrap;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.m.s{align-self:flex-start;background:linear-gradient(135deg,#1c2333,#252d3d);border:1px solid rgba(212,175,55,0.12);color:#e0ddd8;border-bottom-left-radius:4px;display:flex;gap:0.5rem;align-items:flex-start}
.m.s .av{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px}
.m.s .bub{flex:1}
.m.s .n{font-weight:600;color:#d4af37;font-size:.75rem;margin-bottom:2px}
.m.u{align-self:flex-end;background:linear-gradient(135deg,#1a3a5c,#1e4a6e);border:1px solid rgba(100,160,220,0.15);color:#d8e8f8;border-bottom-right-radius:4px}
.m.typing{align-self:flex-start;background:linear-gradient(135deg,#1c2333,#252d3d);border:1px solid rgba(212,175,55,0.12);display:flex;gap:0.5rem;align-items:flex-start;padding:8px 12px}
.m.typing .dots span{animation:blink 1.4s infinite;font-style:normal;font-size:1.2rem;color:#8b9dc3}
.m.typing .dots span:nth-child(2){animation-delay:0.2s}
.m.typing .dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,60%,100%{opacity:0.2}30%{opacity:1}}
#inputArea{padding:0.5rem;border-top:1px solid rgba(212,175,55,0.15)}
#chatForm{display:flex;gap:0.5rem}
#q{flex:1;padding:0.6rem 0.8rem;border-radius:8px;border:1px solid rgba(212,175,55,0.3);background:#151a28;color:#e8e6e3;font-size:0.85rem;outline:none;resize:none}
#q:focus{border-color:#d4af37;box-shadow:0 0 0 2px rgba(212,175,55,0.15)}
#q::placeholder{color:#5a6a80}
#btn{padding:0.6rem 1.2rem;border-radius:8px;border:none;background:linear-gradient(135deg,#d4af37,#b8962e);color:#0a0e1a;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.2s}
#btn:hover{background:linear-gradient(135deg,#e0c050,#c8a438)}
#btn:disabled{opacity:0.5;cursor:not-allowed}
.disc{text-align:center;font-size:.65rem;color:#5a6a80;padding:0.3rem 0.5rem}
</style>

const ENDPOINT="https://sarah-backend.vercel.app/api/chat";
const $q=document.getElementById("q"),$btn=document.getElementById("btn"),
      $msgs=document.getElementById("msgs");
let history=[];

function addMsg(role,text){
  const d=document.createElement("div");
  if(role==="user"){d.className="m u";d.textContent=text;}
  else{d.className="m s";d.innerHTML='<img class="av" src="'+SARAH_AVATAR+'" alt="Sarah"><div class="bub"><div class="n">Sarah</div>'+text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")+'</div>';}
  $msgs.appendChild(d);$msgs.scrollTop=$msgs.scrollHeight;
}

function showTyping(){
  const d=document.createElement("div");
  d.className="m typing";d.id="typingIndicator";
  d.innerHTML='<img class="av" src="'+SARAH_AVATAR+'" alt="Sarah"><div class="bub"><div class="n">Sarah</div><div class="dots"><span>●</span><span>●</span><span>●</span></div></div>';
  $msgs.appendChild(d);$msgs.scrollTop=$msgs.scrollHeight;
}
function hideTyping(){const el=document.getElementById("typingIndicator");if(el)el.remove();}

document.getElementById("chatForm").addEventListener("submit",async(e)=>{
  e.preventDefault();
  const userInput=$q.value.trim();
  if(!userInput)return;
  addMsg("user",userInput);
  $q.value="";$btn.disabled=true;
  showTyping();
  try{
    const r=await fetch(ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userInput,history})});
    const data=await r.json();
    hideTyping();
    if(data.answer){addMsg("sarah",data.answer);history=data.history||[];}
    else{addMsg("sarah","I'm having trouble responding. Please try again.");}
  }catch(err){hideTyping();addMsg("sarah","Sorry, I couldn't connect. Please try again in a moment.");}
  $btn.disabled=false;$q.focus();
});
$q.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();document.getElementById("chatForm").dispatchEvent(new Event("submit"));}});
